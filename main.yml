name: Simple Python CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Run app
      run: python app.py

    - name: Test logic inside YAML
      run: |
        python - <<EOF
        from app import add

        result = add(2, 3)

        if result == 5:
            print("Test Passed ✅")
        else:
            print("Test Failed ❌")
            exit(1)
        EOF
